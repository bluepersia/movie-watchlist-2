<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Movie Watchlist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Global CSS-->
    <link rel="stylesheet" href="./src/css/tokens.css" />
    <link rel="stylesheet" href="./src/css/index.css" />
    <link rel="stylesheet" href="./src/css/utilities.css" />

    <!-- Blocks-->
    <link rel="stylesheet" href="./src/css/blocks/header/header.css" />
    <link rel="stylesheet" href="./src/css/blocks/nav/nav.css" />
    <link rel="stylesheet" href="./src/css/blocks/search/search.css" />
    <link rel="stylesheet" href="./src/css/blocks/no-results/no-results.css" />
    <link rel="stylesheet" href="./src/css/blocks/movie-list/movie-list.css" />
    <link rel="stylesheet" href="./src/css/blocks/movie-card/movie-card.css" />
  </head>

  <body>
    <header class="header">
      <div class="header__inner container">
        <h1 class="header__title">Find your film</h1>

        <nav class="nav">
          <a href="./watchlist.html" class="nav__link">My Watchlist</a>
        </nav>

        <section class="header__search search container" id="search">
          <h2 class="search__title sr-only">Search</h2>
          <form class="search__form" data-form>
            <div class="search__field">
              <img class="search__icon" src="./img/Search.png" alt="" />
              <label for="search-input" class="sr-only">Movie Title</label>
              <input
                class="search__input"
                name="movie-title"
                id="search-input"
                placeholder="Blade Runner"
                required
              />
            </div>

            <button class="search__btn" type="submit">Search</button>
          </form>
        </section>
      </div>
    </header>

    <main>
      <h2 class="sr-only">Search Results</h2>
      <div class="no-results" id="no-results">
        <img
          src="./img/film-icon.png"
          alt="Film tape"
          class="no-results__icon"
        />
        <p class="no-results__text">Start exploring</p>
      </div>
    </main>

    <script src="./src/js/index.js" type="module"></script>
  </body>
</html>
